# Configuration for tools/module_generator.py
#
# Modules listed under 'exclude_modules' will be skipped during auto-generation.
# Use the full module name (e.g. "firewall_rule", "firewall_rules_info").
# This is useful when a module has been manually customized and should not be
# overwritten by the generator.
exclude_modules: []

# Modules listed under 'exclude_molecule_modules' will be skipped when
# generating molecule test task files via tools/molecule_test_generator.py.
# Use the full module name. This is useful for destructive or unsupported
# modules that should not be exercised automatically against the mock API.
exclude_molecule_modules: []



