[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["ansible_collections.pfrest.pfsense.plugins.module_utils"]
omit = [
    "*/assets/*",
    "*/schema_dict.py",
]

[tool.coverage.paths]
source = [
    "plugins/module_utils",
    "**/ansible_collections/pfrest/pfsense/plugins/module_utils",
]

[tool.coverage.report]
show_missing = true
fail_under = 0
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
]

[tool.coverage.html]
directory = "htmlcov"

[tool.black]
exclude = '''/(
    plugins/module_utils/embedded_schema.py
)'''
