---
- name: Test pfrest.pfsense.services_dns_forwarder_host_override module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage DNS Forwarder Host Override
      register: result
      pfrest.pfsense.services_dns_forwarder_host_override:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        state: present
        lookup_fields:
          - id
        host: string
        domain: string
        ip: string
        descr: string
        aliases:
          - host: string
            domain: string
            description: string

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.host is defined
          - result.data.domain is defined
          - result.data.ip is defined
          - result.data.descr is defined
          - result.data.aliases is defined
          - result.data.id is defined

