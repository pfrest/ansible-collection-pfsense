---
- name: Test pfrest.pfsense.firewall_schedules module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage all Firewall Schedules
      register: result
      pfrest.pfsense.firewall_schedules:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        objects:
          - name: string
            descr: string
            timerange:
              - position:
                  - 1
                month:
                  - 1
                day:
                  - 9223372036854776000
                hour: string
                rangedescr: string

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence

