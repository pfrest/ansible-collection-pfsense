---
- name: Test pfrest.pfsense.services_ssh module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage SSH
      register: result
      pfrest.pfsense.services_ssh:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        enable: true
        port: string
        sshdkeyonly: enabled
        sshdagentforwarding: true

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.enable is defined
          - result.data.port is defined
          - result.data.sshdkeyonly is defined
          - result.data.sshdagentforwarding is defined

