---
- name: Test pfrest.pfsense.firewall_states_size module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage Firewall States Size
      register: result
      pfrest.pfsense.firewall_states_size:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        maximumstates: 9223372036854776000

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.maximumstates is defined
          - result.data.defaultmaximumstates is defined
          - result.data.currentstates is defined

