---
- name: Test pfrest.pfsense.services_haproxy_backend_servers_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Retrieve HA Proxy Backend Servers
      register: result
      pfrest.pfsense.services_haproxy_backend_servers_info:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence
          - 'result.data | length > 0'
          - result.data[0].name is defined
          - result.data[0].status is defined
          - result.data[0].address is defined
          - result.data[0].port is defined
          - result.data[0].weight is defined
          - result.data[0].ssl is defined
          - result.data[0].sslserververify is defined
          - result.data[0].serverid is defined
          - result.data[0].advanced is defined
          - result.data[0].id is defined

