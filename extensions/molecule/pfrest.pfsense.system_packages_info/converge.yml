---
- name: Test pfrest.pfsense.system_packages_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Retrieve Packages
      register: result
      pfrest.pfsense.system_packages_info:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence
          - 'result.data | length > 0'
          - result.data[0].name is defined
          - result.data[0].shortname is defined
          - result.data[0].descr is defined
          - result.data[0].installed_version is defined
          - result.data[0].latest_version is defined
          - result.data[0].update_available is defined
          - result.data[0].id is defined

