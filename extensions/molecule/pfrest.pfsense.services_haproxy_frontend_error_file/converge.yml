---
- name: Test pfrest.pfsense.services_haproxy_frontend_error_file module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage HA Proxy Frontend Error File
      register: result
      pfrest.pfsense.services_haproxy_frontend_error_file:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        state: present
        lookup_fields:
          - errorcode
        errorcode: 9223372036854776000
        errorfile: string
        parent_lookup_query:
          name: string
    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.errorcode is defined
          - result.data.errorfile is defined
          - result.data.parent_id is defined
          - result.data.id is defined

