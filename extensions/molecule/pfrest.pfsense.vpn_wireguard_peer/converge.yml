---
- name: Test pfrest.pfsense.vpn_wireguard_peer module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage WireGuard Peer
      register: result
      pfrest.pfsense.vpn_wireguard_peer:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        state: present
        lookup_fields:
          - publickey
        enabled: true
        tun: string
        endpoint: string
        port: string
        descr: string
        persistentkeepalive: 9223372036854776000
        publickey: string
        presharedkey: string
        allowedips:
          - address: string
            mask: 9223372036854776000
            descr: string

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.enabled is defined
          - result.data.tun is defined
          - result.data.endpoint is defined
          - result.data.port is defined
          - result.data.descr is defined
          - result.data.persistentkeepalive is defined
          - result.data.publickey is defined
          - result.data.allowedips is defined
          - result.data.id is defined

