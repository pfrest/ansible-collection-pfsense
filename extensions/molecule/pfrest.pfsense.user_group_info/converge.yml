---
- name: Test pfrest.pfsense.user_group_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read User Group
      register: result
      pfrest.pfsense.user_group_info:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        lookup_params: {}

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.name is defined
          - result.data.name == "string"
          - result.data.gid is defined
          - result.data.gid == 9223372036854776000
          - result.data.scope is defined
          - result.data.scope == "local"
          - result.data.description is defined
          - result.data.description == "string"
          - result.data.member is defined
          - result.data.member is sequence
          - result.data.priv is defined
          - result.data.priv is sequence
          - result.data.id is defined
          - result.data.id == 0

