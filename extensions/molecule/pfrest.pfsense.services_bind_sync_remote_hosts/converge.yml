---
- name: Test pfrest.pfsense.services_bind_sync_remote_hosts module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage all BIND Sync Remote Hosts
      register: result
      pfrest.pfsense.services_bind_sync_remote_hosts:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        objects:
          - syncdestinenable: true
            syncprotocol: http
            ipaddress: string
            syncport: string
            username: string
            password: string

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence

