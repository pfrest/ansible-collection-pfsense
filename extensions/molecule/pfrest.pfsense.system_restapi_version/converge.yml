---
- name: Test pfrest.pfsense.system_restapi_version module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage REST API Version
      register: result
      pfrest.pfsense.system_restapi_version:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.current_version is defined
          - result.data.latest_version is defined
          - result.data.latest_version_release_date is defined
          - result.data.update_available is defined
          - result.data.available_versions is defined

