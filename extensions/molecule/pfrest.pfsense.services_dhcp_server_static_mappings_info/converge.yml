---
- name: Test pfrest.pfsense.services_dhcp_server_static_mappings_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Retrieve DHCP Server Static Mappings
      register: result
      pfrest.pfsense.services_dhcp_server_static_mappings_info:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence
          - 'result.data | length > 0'
          - result.data[0].mac is defined
          - result.data[0].ipaddr is defined
          - result.data[0].cid is defined
          - result.data[0].hostname is defined
          - result.data[0].domain is defined
          - result.data[0].domainsearchlist is defined
          - result.data[0].defaultleasetime is defined
          - result.data[0].maxleasetime is defined
          - result.data[0].gateway is defined
          - result.data[0].dnsserver is defined
          - result.data[0].winsserver is defined
          - result.data[0].ntpserver is defined
          - result.data[0].arp_table_static_entry is defined
          - result.data[0].descr is defined
          - result.data[0].id is defined

