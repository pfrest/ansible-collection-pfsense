---
- name: Test pfrest.pfsense.vpn_wireguard_peer_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read WireGuard Peer
      register: result
      pfrest.pfsense.vpn_wireguard_peer_info:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        lookup_params: {}

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.enabled is defined
          - result.data.enabled == true
          - result.data.tun is defined
          - result.data.tun == "string"
          - result.data.endpoint is defined
          - result.data.endpoint == "string"
          - result.data.port is defined
          - result.data.port == "string"
          - result.data.descr is defined
          - result.data.descr == "string"
          - result.data.persistentkeepalive is defined
          - result.data.persistentkeepalive == 9223372036854776000
          - result.data.publickey is defined
          - result.data.publickey == "string"
          - result.data.allowedips is defined
          - result.data.allowedips is sequence
          - result.data.id is defined
          - result.data.id == 0

