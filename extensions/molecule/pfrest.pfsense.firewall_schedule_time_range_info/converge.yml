---
- name: Test pfrest.pfsense.firewall_schedule_time_range_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read Firewall Schedule Time Range
      register: result
      pfrest.pfsense.firewall_schedule_time_range_info:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        lookup_params: {}

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.position is defined
          - result.data.position is sequence
          - result.data.month is defined
          - result.data.month is sequence
          - result.data.day is defined
          - result.data.day is sequence
          - result.data.hour is defined
          - result.data.hour == "string"
          - result.data.rangedescr is defined
          - result.data.rangedescr == "string"
          - result.data.parent_id is defined
          - result.data.id is defined
          - result.data.id == 0

