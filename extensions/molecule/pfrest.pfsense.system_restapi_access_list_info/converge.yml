---
- name: Test pfrest.pfsense.system_restapi_access_list_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Retrieve REST API Access List Entries
      register: result
      pfrest.pfsense.system_restapi_access_list_info:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence
          - 'result.data | length > 0'
          - result.data[0].type is defined
          - result.data[0].weight is defined
          - result.data[0].network is defined
          - result.data[0].users is defined
          - result.data[0].sched is defined
          - result.data[0].descr is defined
          - result.data[0].id is defined

