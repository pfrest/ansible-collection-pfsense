---
- name: Test pfrest.pfsense.user module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage User
      register: result
      pfrest.pfsense.user:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        state: present
        lookup_fields:
          - name
        name: string
        password: string
        priv:
          - string
        disabled: true
        descr: string
        expires: string
        cert:
          - string
        authorizedkeys: string
        ipsecpsk: string

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.name is defined
          - result.data.password is defined
          - result.data.uid is defined
          - result.data.scope is defined
          - result.data.priv is defined
          - result.data.disabled is defined
          - result.data.descr is defined
          - result.data.expires is defined
          - result.data.cert is defined
          - result.data.authorizedkeys is defined
          - result.data.ipsecpsk is defined
          - result.data.id is defined

