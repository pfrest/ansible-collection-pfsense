---
- name: Test pfrest.pfsense.interface_gre module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage Interface GRE
      register: result
      pfrest.pfsense.interface_gre:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        state: present
        lookup_fields:
          - tunnel_remote_addr
          - tunnel_remote_addr6
        if: string
        descr: string
        add_static_route: true
        remote_addr: string
        tunnel_local_addr: string
        tunnel_remote_addr: string
        tunnel_remote_net: 9223372036854776000
        tunnel_local_addr6: string
        tunnel_remote_addr6: string
        tunnel_remote_net6: 9223372036854776000

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.if is defined
          - result.data.greif is defined
          - result.data.descr is defined
          - result.data.add_static_route is defined
          - result.data.remote_addr is defined
          - result.data.tunnel_local_addr is defined
          - result.data.tunnel_remote_addr is defined
          - result.data.tunnel_remote_net is defined
          - result.data.tunnel_local_addr6 is defined
          - result.data.tunnel_remote_addr6 is defined
          - result.data.tunnel_remote_net6 is defined
          - result.data.id is defined

