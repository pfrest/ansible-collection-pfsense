---
- name: Test pfrest.pfsense.diagnostics_halt_system module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Perform System Halt action
      register: result
      pfrest.pfsense.diagnostics_halt_system:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined

