---
- name: Test pfrest.pfsense.services_dns_forwarder_host_override_alias_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read DNS Forwarder Host Override Alias
      register: result
      pfrest.pfsense.services_dns_forwarder_host_override_alias_info:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        lookup_params: {}

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.host is defined
          - result.data.host == "string"
          - result.data.domain is defined
          - result.data.domain == "string"
          - result.data.description is defined
          - result.data.description == "string"
          - result.data.parent_id is defined
          - result.data.id is defined
          - result.data.id == 0

