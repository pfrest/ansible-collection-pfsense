---
- name: Test pfrest.pfsense.firewall_schedule_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read Firewall Schedule
      register: result
      pfrest.pfsense.firewall_schedule_info:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        lookup_params: {}

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.schedlabel is defined
          - result.data.schedlabel == "string"
          - result.data.name is defined
          - result.data.name == "string"
          - result.data.descr is defined
          - result.data.descr == "string"
          - result.data.active is defined
          - result.data.active == true
          - result.data.timerange is defined
          - result.data.timerange is sequence
          - result.data.id is defined
          - result.data.id == 0

