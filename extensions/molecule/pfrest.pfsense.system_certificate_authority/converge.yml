---
- name: Test pfrest.pfsense.system_certificate_authority module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage Certificate Authority
      register: result
      pfrest.pfsense.system_certificate_authority:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        state: present
        lookup_fields:
          - id
        descr: string
        trust: true
        randomserial: true
        serial: 9223372036854776000
        crt: string
        prv: string

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.descr is defined
          - result.data.refid is defined
          - result.data.trust is defined
          - result.data.randomserial is defined
          - result.data.serial is defined
          - result.data.crt is defined
          - result.data.prv is defined
          - result.data.id is defined

