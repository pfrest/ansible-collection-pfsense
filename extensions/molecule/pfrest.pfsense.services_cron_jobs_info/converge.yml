---
- name: Test pfrest.pfsense.services_cron_jobs_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Retrieve Cron Jobs
      register: result
      pfrest.pfsense.services_cron_jobs_info:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence
          - 'result.data | length > 0'
          - result.data[0].minute is defined
          - result.data[0].hour is defined
          - result.data[0].mday is defined
          - result.data[0].month is defined
          - result.data[0].wday is defined
          - result.data[0].who is defined
          - result.data[0].command is defined
          - result.data[0].id is defined

