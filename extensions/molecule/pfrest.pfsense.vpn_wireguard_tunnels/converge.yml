---
- name: Test pfrest.pfsense.vpn_wireguard_tunnels module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage all WireGuard Tunnels
      register: result
      pfrest.pfsense.vpn_wireguard_tunnels:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        objects:
          - enabled: true
            descr: string
            listenport: string
            privatekey: string
            mtu: 9223372036854776000
            addresses:
              - address: string
                mask: 9223372036854776000
                descr: string

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence

