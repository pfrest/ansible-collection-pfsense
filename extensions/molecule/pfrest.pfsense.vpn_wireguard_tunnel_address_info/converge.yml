---
- name: Test pfrest.pfsense.vpn_wireguard_tunnel_address_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read WireGuard Tunnel Address
      register: result
      pfrest.pfsense.vpn_wireguard_tunnel_address_info:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        lookup_params: {}

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.address is defined
          - result.data.address == "string"
          - result.data.mask is defined
          - result.data.mask == 9223372036854776000
          - result.data.descr is defined
          - result.data.descr == "string"
          - result.data.id is defined
          - result.data.id == 0

