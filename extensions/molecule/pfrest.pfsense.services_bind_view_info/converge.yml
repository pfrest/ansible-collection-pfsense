---
- name: Test pfrest.pfsense.services_bind_view_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read BIND View
      register: result
      pfrest.pfsense.services_bind_view_info:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        lookup_params: {}

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.name is defined
          - result.data.name == "string"
          - result.data.descr is defined
          - result.data.descr == "string"
          - result.data.recursion is defined
          - result.data.recursion == true
          - result.data.match_clients is defined
          - result.data.match_clients is sequence
          - result.data.allow_recursion is defined
          - result.data.allow_recursion is sequence
          - result.data.bind_custom_options is defined
          - result.data.bind_custom_options == "string"
          - result.data.id is defined
          - result.data.id == 0

