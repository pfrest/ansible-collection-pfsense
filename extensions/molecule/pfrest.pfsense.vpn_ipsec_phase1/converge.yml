---
- name: Test pfrest.pfsense.vpn_ipsec_phase1 module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage IPsec Phase 1
      register: result
      pfrest.pfsense.vpn_ipsec_phase1:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        state: present
        lookup_fields:
          - id
        descr: string
        disabled: true
        iketype: ikev1
        mode: main
        protocol: inet
        interface: string
        remote_gateway: string
        authentication_method: pre_shared_key
        myid_type: myaddress
        myid_data: string
        peerid_type: any
        peerid_data: string
        pre_shared_key: string
        certref: string
        caref: string
        rekey_time: 9223372036854776000
        reauth_time: 9223372036854776000
        rand_time: 9223372036854776000
        lifetime: 9223372036854776000
        startaction: ''
        closeaction: ''
        nat_traversal: on
        gw_duplicates: true
        mobike: true
        splitconn: true
        prfselect_enable: true
        ikeport: string
        nattport: string
        dpd_delay: 9223372036854776000
        dpd_maxfail: 9223372036854776000
        encryption:
          - encryption_algorithm_name: aes
            encryption_algorithm_keylen: 9223372036854776000
            hash_algorithm: sha1
            dhgroup: 1
            prf_algorithm: sha1

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.ikeid is defined
          - result.data.descr is defined
          - result.data.disabled is defined
          - result.data.iketype is defined
          - result.data.mode is defined
          - result.data.protocol is defined
          - result.data.interface is defined
          - result.data.remote_gateway is defined
          - result.data.authentication_method is defined
          - result.data.myid_type is defined
          - result.data.myid_data is defined
          - result.data.peerid_type is defined
          - result.data.peerid_data is defined
          - result.data.pre_shared_key is defined
          - result.data.certref is defined
          - result.data.caref is defined
          - result.data.rekey_time is defined
          - result.data.reauth_time is defined
          - result.data.rand_time is defined
          - result.data.lifetime is defined
          - result.data.startaction is defined
          - result.data.closeaction is defined
          - result.data.nat_traversal is defined
          - result.data.gw_duplicates is defined
          - result.data.mobike is defined
          - result.data.splitconn is defined
          - result.data.prfselect_enable is defined
          - result.data.ikeport is defined
          - result.data.nattport is defined
          - result.data.dpd_delay is defined
          - result.data.dpd_maxfail is defined
          - result.data.encryption is defined
          - result.data.id is defined

