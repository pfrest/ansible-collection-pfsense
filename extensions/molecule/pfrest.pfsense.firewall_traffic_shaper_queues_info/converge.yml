---
- name: Test pfrest.pfsense.firewall_traffic_shaper_queues_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Retrieve Traffic Shaper Queues
      register: result
      pfrest.pfsense.firewall_traffic_shaper_queues_info:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence
          - 'result.data | length > 0'
          - result.data[0].interface is defined
          - result.data[0].enabled is defined
          - result.data[0].name is defined
          - result.data[0].priority is defined
          - result.data[0].qlimit is defined
          - result.data[0].description is defined
          - result.data[0].default is defined
          - result.data[0].red is defined
          - result.data[0].rio is defined
          - result.data[0].ecn is defined
          - result.data[0].codel is defined
          - result.data[0].bandwidthtype is defined
          - result.data[0].bandwidth is defined
          - result.data[0].buckets is defined
          - result.data[0].hogs is defined
          - result.data[0].borrow is defined
          - result.data[0].upperlimit is defined
          - result.data[0].upperlimit_m1 is defined
          - result.data[0].upperlimit_d is defined
          - result.data[0].upperlimit_m2 is defined
          - result.data[0].realtime is defined
          - result.data[0].realtime_m1 is defined
          - result.data[0].realtime_d is defined
          - result.data[0].realtime_m2 is defined
          - result.data[0].linkshare is defined
          - result.data[0].linkshare_m1 is defined
          - result.data[0].linkshare_d is defined
          - result.data[0].linkshare_m2 is defined
          - result.data[0].parent_id is defined
          - result.data[0].id is defined

