---
- name: Test pfrest.pfsense.users_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Retrieve Users
      register: result
      pfrest.pfsense.users_info:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence
          - 'result.data | length > 0'
          - result.data[0].name is defined
          - result.data[0].password is defined
          - result.data[0].uid is defined
          - result.data[0].scope is defined
          - result.data[0].priv is defined
          - result.data[0].disabled is defined
          - result.data[0].descr is defined
          - result.data[0].expires is defined
          - result.data[0].cert is defined
          - result.data[0].authorizedkeys is defined
          - result.data[0].ipsecpsk is defined
          - result.data[0].id is defined

