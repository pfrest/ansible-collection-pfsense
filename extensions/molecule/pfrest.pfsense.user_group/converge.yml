---
- name: Test pfrest.pfsense.user_group module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage User Group
      register: result
      pfrest.pfsense.user_group:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        state: present
        lookup_fields:
          - name
        name: string
        scope: local
        description: string
        member:
          - string
        priv:
          - string

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.name is defined
          - result.data.gid is defined
          - result.data.scope is defined
          - result.data.description is defined
          - result.data.member is defined
          - result.data.priv is defined
          - result.data.id is defined

