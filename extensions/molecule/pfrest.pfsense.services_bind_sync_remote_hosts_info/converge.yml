---
- name: Test pfrest.pfsense.services_bind_sync_remote_hosts_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Retrieve BIND Sync Remote Hosts
      register: result
      pfrest.pfsense.services_bind_sync_remote_hosts_info:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence
          - 'result.data | length > 0'
          - result.data[0].syncdestinenable is defined
          - result.data[0].syncprotocol is defined
          - result.data[0].ipaddress is defined
          - result.data[0].syncport is defined
          - result.data[0].username is defined
          - result.data[0].password is defined
          - result.data[0].id is defined

