---
- name: Test pfrest.pfsense.firewall_traffic_shaper_queue module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage Traffic Shaper Queue
      register: result
      pfrest.pfsense.firewall_traffic_shaper_queue:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        state: present
        lookup_fields:
          - name
          - priority
        enabled: true
        name: string
        priority: 9223372036854776000
        qlimit: 9223372036854776000
        description: string
        default: true
        red: true
        rio: true
        ecn: true
        codel: true
        bandwidthtype: '%'
        bandwidth: 9223372036854776000
        buckets: 9223372036854776000
        hogs: 9223372036854776000
        borrow: true
        upperlimit: true
        upperlimit_m1: string
        upperlimit_d: 9223372036854776000
        upperlimit_m2: string
        realtime: true
        realtime_m1: string
        realtime_d: 9223372036854776000
        realtime_m2: string
        linkshare: true
        linkshare_m1: string
        linkshare_d: 9223372036854776000
        linkshare_m2: string
        parent_lookup_query:
          interface: string
    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.interface is defined
          - result.data.enabled is defined
          - result.data.name is defined
          - result.data.priority is defined
          - result.data.qlimit is defined
          - result.data.description is defined
          - result.data.default is defined
          - result.data.red is defined
          - result.data.rio is defined
          - result.data.ecn is defined
          - result.data.codel is defined
          - result.data.bandwidthtype is defined
          - result.data.bandwidth is defined
          - result.data.buckets is defined
          - result.data.hogs is defined
          - result.data.borrow is defined
          - result.data.upperlimit is defined
          - result.data.upperlimit_m1 is defined
          - result.data.upperlimit_d is defined
          - result.data.upperlimit_m2 is defined
          - result.data.realtime is defined
          - result.data.realtime_m1 is defined
          - result.data.realtime_d is defined
          - result.data.realtime_m2 is defined
          - result.data.linkshare is defined
          - result.data.linkshare_m1 is defined
          - result.data.linkshare_d is defined
          - result.data.linkshare_m2 is defined
          - result.data.parent_id is defined
          - result.data.id is defined

