---
- name: Test pfrest.pfsense.services_bind_access_list module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage BIND Access List
      register: result
      pfrest.pfsense.services_bind_access_list:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        state: present
        lookup_fields:
          - name
        name: string
        description: string
        entries:
          - value: string
            description: string

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.name is defined
          - result.data.description is defined
          - result.data.entries is defined
          - result.data.id is defined

