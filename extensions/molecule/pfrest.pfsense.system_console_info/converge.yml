---
- name: Test pfrest.pfsense.system_console_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read System Console
      register: result
      pfrest.pfsense.system_console_info:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        lookup_params: {}

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.passwd_protect_console is defined
          - result.data.passwd_protect_console == true

