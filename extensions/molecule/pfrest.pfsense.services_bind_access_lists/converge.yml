---
- name: Test pfrest.pfsense.services_bind_access_lists module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage all BIND Access Lists
      register: result
      pfrest.pfsense.services_bind_access_lists:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        objects:
          - name: string
            description: string
            entries:
              - value: string
                description: string

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence

