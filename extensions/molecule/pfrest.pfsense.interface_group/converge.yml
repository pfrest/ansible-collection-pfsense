---
- name: Test pfrest.pfsense.interface_group module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage Interface Group
      register: result
      pfrest.pfsense.interface_group:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        state: present
        lookup_fields:
          - ifname
        ifname: string
        members:
          - string
        descr: string

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.ifname is defined
          - result.data.members is defined
          - result.data.descr is defined
          - result.data.id is defined

