---
- name: Test pfrest.pfsense.firewall_schedule_time_ranges_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Retrieve Firewall Schedule Time Ranges
      register: result
      pfrest.pfsense.firewall_schedule_time_ranges_info:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence
          - 'result.data | length > 0'
          - result.data[0].position is defined
          - result.data[0].month is defined
          - result.data[0].day is defined
          - result.data[0].hour is defined
          - result.data[0].rangedescr is defined
          - result.data[0].id is defined

