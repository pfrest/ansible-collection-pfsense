---
- name: Test pfrest.pfsense.services_dhcp_server_address_pool_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read DHCP Server Address Pool
      register: result
      pfrest.pfsense.services_dhcp_server_address_pool_info:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        lookup_params: {}

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.range_from is defined
          - result.data.range_from == "string"
          - result.data.range_to is defined
          - result.data.range_to == "string"
          - result.data.domain is defined
          - result.data.domain == "string"
          - result.data.mac_allow is defined
          - result.data.mac_allow is sequence
          - result.data.mac_deny is defined
          - result.data.mac_deny is sequence
          - result.data.domainsearchlist is defined
          - result.data.domainsearchlist is sequence
          - result.data.defaultleasetime is defined
          - result.data.defaultleasetime == 9223372036854776000
          - result.data.maxleasetime is defined
          - result.data.maxleasetime == 9223372036854776000
          - result.data.gateway is defined
          - result.data.gateway == "string"
          - result.data.dnsserver is defined
          - result.data.dnsserver is sequence
          - result.data.winsserver is defined
          - result.data.winsserver is sequence
          - result.data.ntpserver is defined
          - result.data.ntpserver is sequence
          - result.data.ignorebootp is defined
          - result.data.ignorebootp == true
          - result.data.ignoreclientuids is defined
          - result.data.ignoreclientuids == true
          - result.data.denyunknown is defined
          - result.data.denyunknown == "enabled"
          - result.data.parent_id is defined
          - result.data.id is defined
          - result.data.id == 0

