---
- name: Test pfrest.pfsense.services_dhcp_server_address_pool module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage DHCP Server Address Pool
      register: result
      pfrest.pfsense.services_dhcp_server_address_pool:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        state: present
        lookup_fields:
          - id
        range_from: string
        range_to: string
        domain: string
        mac_allow:
          - string
        mac_deny:
          - string
        domainsearchlist:
          - string
        defaultleasetime: 9223372036854776000
        maxleasetime: 9223372036854776000
        gateway: string
        dnsserver:
          - string
        winsserver:
          - string
        ntpserver:
          - string
        ignorebootp: true
        ignoreclientuids: true
        denyunknown: enabled
        parent_lookup_query:
          id: 0
    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.range_from is defined
          - result.data.range_to is defined
          - result.data.domain is defined
          - result.data.mac_allow is defined
          - result.data.mac_deny is defined
          - result.data.domainsearchlist is defined
          - result.data.defaultleasetime is defined
          - result.data.maxleasetime is defined
          - result.data.gateway is defined
          - result.data.dnsserver is defined
          - result.data.winsserver is defined
          - result.data.ntpserver is defined
          - result.data.ignorebootp is defined
          - result.data.ignoreclientuids is defined
          - result.data.denyunknown is defined
          - result.data.parent_id is defined
          - result.data.id is defined

