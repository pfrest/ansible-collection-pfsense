---
- name: Test pfrest.pfsense.services_haproxy_frontend_certificate_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read HAProxy Frontend Certificates
      register: result
      pfrest.pfsense.services_haproxy_frontend_certificate_info:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        lookup_params: {}

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.ssl_certificate is defined
          - result.data.ssl_certificate == "string"
          - result.data.parent_id is defined
          - result.data.id is defined
          - result.data.id == 0

