---
- name: Test pfrest.pfsense.firewall_traffic_shaper_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read Traffic Shaper
      register: result
      pfrest.pfsense.firewall_traffic_shaper_info:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        lookup_params: {}

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.enabled is defined
          - result.data.enabled == true
          - result.data.interface is defined
          - result.data.interface == "string"
          - result.data.name is defined
          - result.data.name == "string"
          - result.data.scheduler is defined
          - result.data.scheduler == "HFSC"
          - result.data.bandwidthtype is defined
          - result.data.bandwidthtype == "%"
          - result.data.bandwidth is defined
          - result.data.bandwidth == 9223372036854776000
          - result.data.qlimit is defined
          - result.data.qlimit == 9223372036854776000
          - result.data.tbrconfig is defined
          - result.data.tbrconfig == 9223372036854776000
          - result.data.queue is defined
          - result.data.queue is sequence
          - result.data.id is defined
          - result.data.id == 0

