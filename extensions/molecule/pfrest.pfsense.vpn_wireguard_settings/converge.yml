---
- name: Test pfrest.pfsense.vpn_wireguard_settings module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage WireGuard Settings
      register: result
      pfrest.pfsense.vpn_wireguard_settings:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        enable: true
        keep_conf: true
        resolve_interval_track: true
        resolve_interval: 9223372036854776000
        interface_group: all
        hide_secrets: true
        hide_peers: true

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.enable is defined
          - result.data.keep_conf is defined
          - result.data.resolve_interval_track is defined
          - result.data.resolve_interval is defined
          - result.data.interface_group is defined
          - result.data.hide_secrets is defined
          - result.data.hide_peers is defined

