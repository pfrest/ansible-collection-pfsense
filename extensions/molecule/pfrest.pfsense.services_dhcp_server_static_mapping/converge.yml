---
- name: Test pfrest.pfsense.services_dhcp_server_static_mapping module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage DHCP Server Static Mapping
      register: result
      pfrest.pfsense.services_dhcp_server_static_mapping:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        state: present
        lookup_fields:
          - mac
        mac: string
        ipaddr: string
        cid: string
        hostname: string
        domain: string
        domainsearchlist:
          - string
        defaultleasetime: 9223372036854776000
        maxleasetime: 9223372036854776000
        gateway: string
        dnsserver:
          - string
        winsserver:
          - string
        ntpserver:
          - string
        arp_table_static_entry: true
        descr: string
        parent_lookup_fields:
          - id
        id: 0

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.mac is defined
          - result.data.ipaddr is defined
          - result.data.cid is defined
          - result.data.hostname is defined
          - result.data.domain is defined
          - result.data.domainsearchlist is defined
          - result.data.defaultleasetime is defined
          - result.data.maxleasetime is defined
          - result.data.gateway is defined
          - result.data.dnsserver is defined
          - result.data.winsserver is defined
          - result.data.ntpserver is defined
          - result.data.arp_table_static_entry is defined
          - result.data.descr is defined
          - result.data.id is defined

