---
- name: Test pfrest.pfsense.routing_gateway_group module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage Routing Gateway Group
      register: result
      pfrest.pfsense.routing_gateway_group:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        state: present
        lookup_fields:
          - name
        name: string
        trigger: down
        descr: string
        priorities:
          - gateway: string
            tier: 9223372036854776000
            virtual_ip: string

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.name is defined
          - result.data.trigger is defined
          - result.data.descr is defined
          - result.data.ipprotocol is defined
          - result.data.priorities is defined
          - result.data.id is defined

