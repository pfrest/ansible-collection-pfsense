---
- name: Test pfrest.pfsense.diagnostics_config_history_revisions_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Retrieve Configuration History Entries
      register: result
      pfrest.pfsense.diagnostics_config_history_revisions_info:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence
          - 'result.data | length > 0'
          - result.data[0].time is defined
          - result.data[0].description is defined
          - result.data[0].version is defined
          - result.data[0].filesize is defined
          - result.data[0].id is defined

