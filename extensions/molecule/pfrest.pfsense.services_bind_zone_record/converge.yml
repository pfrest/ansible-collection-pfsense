---
- name: Test pfrest.pfsense.services_bind_zone_record module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage BIND Zone Record
      register: result
      pfrest.pfsense.services_bind_zone_record:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        state: present
        lookup_fields:
          - id
        name: string
        type: A
        rdata: string
        priority: 9223372036854776000
        parent_lookup_query:
          name: string
          serial: 9223372036854776000
    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.name is defined
          - result.data.type is defined
          - result.data.rdata is defined
          - result.data.priority is defined
          - result.data.parent_id is defined
          - result.data.id is defined

