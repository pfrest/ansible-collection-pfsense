---
- name: Test pfrest.pfsense.interface_bridge_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read Interface Bridge
      register: result
      pfrest.pfsense.interface_bridge_info:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        lookup_params: {}

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.members is defined
          - result.data.members is sequence
          - result.data.descr is defined
          - result.data.descr == "string"
          - result.data.bridgeif is defined
          - result.data.bridgeif == "string"
          - result.data.id is defined
          - result.data.id == 0

