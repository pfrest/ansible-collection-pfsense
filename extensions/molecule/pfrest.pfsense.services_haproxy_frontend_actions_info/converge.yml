---
- name: Test pfrest.pfsense.services_haproxy_frontend_actions_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Retrieve HA Proxy Frontend Actions
      register: result
      pfrest.pfsense.services_haproxy_frontend_actions_info:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence
          - 'result.data | length > 0'
          - result.data[0].action is defined
          - result.data[0].acl is defined
          - result.data[0].backend is defined
          - result.data[0].customaction is defined
          - result.data[0].deny_status is defined
          - result.data[0].realm is defined
          - result.data[0].rule is defined
          - result.data[0].lua_function is defined
          - result.data[0].name is defined
          - result.data[0].fmt is defined
          - result.data[0].find is defined
          - result.data[0].replace is defined
          - result.data[0].path is defined
          - result.data[0].status is defined
          - result.data[0].reason is defined
          - result.data[0].id is defined

