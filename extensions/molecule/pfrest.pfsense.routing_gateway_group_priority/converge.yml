---
- name: Test pfrest.pfsense.routing_gateway_group_priority module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage Routing Gateway Group Priority
      register: result
      pfrest.pfsense.routing_gateway_group_priority:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        state: present
        lookup_fields:
          - gateway
        gateway: string
        tier: 9223372036854776000
        virtual_ip: string
        parent_lookup_query:
          name: string
    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.gateway is defined
          - result.data.tier is defined
          - result.data.virtual_ip is defined
          - result.data.parent_id is defined
          - result.data.id is defined

