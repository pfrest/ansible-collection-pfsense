---
- name: Test pfrest.pfsense.firewall_nat_port_forwards module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage all Port Forwards
      register: result
      pfrest.pfsense.firewall_nat_port_forwards:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        objects:
          - interface: string
            ipprotocol: inet
            protocol: any
            source: string
            source_port: string
            destination: string
            destination_port: string
            target: string
            local_port: string
            disabled: true
            nordr: true
            nosync: true
            descr: string
            natreflection: enable
            associated_rule_id: string

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence

