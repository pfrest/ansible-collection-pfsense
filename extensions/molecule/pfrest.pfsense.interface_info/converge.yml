---
- name: Test pfrest.pfsense.interface_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read Network Interface
      register: result
      pfrest.pfsense.interface_info:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        lookup_params: {}

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.if is defined
          - result.data.if == "string"
          - result.data.enable is defined
          - result.data.enable == true
          - result.data.descr is defined
          - result.data.descr == "string"
          - result.data.spoofmac is defined
          - result.data.spoofmac == "string"
          - result.data.mtu is defined
          - result.data.mtu == 9223372036854776000
          - result.data.mss is defined
          - result.data.mss == 9223372036854776000
          - result.data.media is defined
          - result.data.media == "string"
          - result.data.mediaopt is defined
          - result.data.mediaopt == "string"
          - result.data.blockpriv is defined
          - result.data.blockpriv == true
          - result.data.blockbogons is defined
          - result.data.blockbogons == true
          - result.data.typev4 is defined
          - result.data.typev4 == "static"
          - result.data.ipaddr is defined
          - result.data.ipaddr == "string"
          - result.data.subnet is defined
          - result.data.subnet == 9223372036854776000
          - result.data.gateway is defined
          - result.data.gateway == "string"
          - result.data.dhcphostname is defined
          - result.data.dhcphostname == "string"
          - result.data.alias_address is defined
          - result.data.alias_address == "string"
          - result.data.alias_subnet is defined
          - result.data.alias_subnet == 9223372036854776000
          - result.data.dhcprejectfrom is defined
          - result.data.dhcprejectfrom is sequence
          - result.data.adv_dhcp_config_advanced is defined
          - result.data.adv_dhcp_config_advanced == true
          - result.data.adv_dhcp_pt_values is defined
          - result.data.adv_dhcp_pt_values == "SavedCfg"
          - result.data.adv_dhcp_pt_timeout is defined
          - result.data.adv_dhcp_pt_timeout == 9223372036854776000
          - result.data.adv_dhcp_pt_retry is defined
          - result.data.adv_dhcp_pt_retry == 9223372036854776000
          - result.data.adv_dhcp_pt_select_timeout is defined
          - result.data.adv_dhcp_pt_select_timeout == 9223372036854776000
          - result.data.adv_dhcp_pt_reboot is defined
          - result.data.adv_dhcp_pt_reboot == 9223372036854776000
          - result.data.adv_dhcp_pt_backoff_cutoff is defined
          - result.data.adv_dhcp_pt_backoff_cutoff == 9223372036854776000
          - result.data.adv_dhcp_pt_initial_interval is defined
          - result.data.adv_dhcp_pt_initial_interval == 9223372036854776000
          - result.data.adv_dhcp_send_options is defined
          - result.data.adv_dhcp_send_options == "string"
          - result.data.adv_dhcp_request_options is defined
          - result.data.adv_dhcp_request_options == "string"
          - result.data.adv_dhcp_required_options is defined
          - result.data.adv_dhcp_required_options == "string"
          - result.data.adv_dhcp_option_modifiers is defined
          - result.data.adv_dhcp_option_modifiers == "string"
          - result.data.adv_dhcp_config_file_override is defined
          - result.data.adv_dhcp_config_file_override == true
          - result.data.adv_dhcp_config_file_override_path is defined
          - result.data.adv_dhcp_config_file_override_path == "string"
          - result.data.typev6 is defined
          - result.data.typev6 == "staticv6"
          - result.data.ipaddrv6 is defined
          - result.data.ipaddrv6 == "string"
          - result.data.subnetv6 is defined
          - result.data.subnetv6 == 9223372036854776000
          - result.data.gatewayv6 is defined
          - result.data.gatewayv6 == "string"
          - result.data.ipv6usev4iface is defined
          - result.data.ipv6usev4iface == true
          - result.data.slaacusev4iface is defined
          - result.data.slaacusev4iface == true
          - result.data.prefix_6rd is defined
          - result.data.prefix_6rd == "string"
          - result.data.gateway_6rd is defined
          - result.data.gateway_6rd == "string"
          - result.data.prefix_6rd_v4plen is defined
          - result.data.prefix_6rd_v4plen == 9223372036854776000
          - result.data.track6_interface is defined
          - result.data.track6_interface == "string"
          - result.data.track6_prefix_id_hex is defined
          - result.data.track6_prefix_id_hex == "string"
          - result.data.id is defined
          - result.data.id == 0

