---
- name: Test pfrest.pfsense.services_dns_resolver_host_override_alias module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage DNS Resolver Host Override Alias
      register: result
      pfrest.pfsense.services_dns_resolver_host_override_alias:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        state: present
        lookup_fields:
          - id
        host: string
        domain: string
        descr: string
        parent_lookup_query:
          id: 0
    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.host is defined
          - result.data.domain is defined
          - result.data.descr is defined
          - result.data.parent_id is defined
          - result.data.id is defined

