---
- name: Test pfrest.pfsense.vpn_openvpn_client module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage Open VPN Client
      register: result
      pfrest.pfsense.vpn_openvpn_client:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        state: present
        lookup_fields:
          - id
        description: string
        disable: true
        mode: p2p_tls
        dev_mode: tun
        protocol: UDP4
        interface: string
        server_addr: string
        server_port: string
        local_port: string
        proxy_addr: string
        proxy_port: string
        proxy_authtype: none
        proxy_user: string
        proxy_passwd: string
        auth_user: string
        auth_pass: string
        auth_retry_none: true
        tls: string
        tls_type: auth
        tlsauth_keydir: default
        caref: string
        certref: string
        data_ciphers:
          - string
        data_ciphers_fallback: string
        digest: string
        remote_cert_tls: true
        tunnel_network: string
        tunnel_networkv6: string
        remote_network:
          - string
        remote_networkv6:
          - string
        use_shaper: 9223372036854776000
        allow_compression: no
        passtos: true
        route_no_pull: true
        route_no_exec: true
        dns_add: true
        topology: subnet
        inactive_seconds: 9223372036854776000
        ping_method: keepalive
        keepalive_interval: 9223372036854776000
        keepalive_timeout: 9223372036854776000
        ping_seconds: 9223372036854776000
        ping_action: ping_restart
        ping_action_seconds: 9223372036854776000
        custom_options:
          - string
        udp_fast_io: true
        exit_notify: 1
        sndrcvbuf: 65536
        create_gw: both
        verbosity_level: 0

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.vpnid is defined
          - result.data.vpnif is defined
          - result.data.description is defined
          - result.data.disable is defined
          - result.data.mode is defined
          - result.data.dev_mode is defined
          - result.data.protocol is defined
          - result.data.interface is defined
          - result.data.server_addr is defined
          - result.data.server_port is defined
          - result.data.local_port is defined
          - result.data.proxy_addr is defined
          - result.data.proxy_port is defined
          - result.data.proxy_authtype is defined
          - result.data.proxy_user is defined
          - result.data.proxy_passwd is defined
          - result.data.auth_user is defined
          - result.data.auth_pass is defined
          - result.data.auth_retry_none is defined
          - result.data.tls is defined
          - result.data.tls_type is defined
          - result.data.tlsauth_keydir is defined
          - result.data.caref is defined
          - result.data.certref is defined
          - result.data.data_ciphers is defined
          - result.data.data_ciphers_fallback is defined
          - result.data.digest is defined
          - result.data.remote_cert_tls is defined
          - result.data.tunnel_network is defined
          - result.data.tunnel_networkv6 is defined
          - result.data.remote_network is defined
          - result.data.remote_networkv6 is defined
          - result.data.use_shaper is defined
          - result.data.allow_compression is defined
          - result.data.passtos is defined
          - result.data.route_no_pull is defined
          - result.data.route_no_exec is defined
          - result.data.dns_add is defined
          - result.data.topology is defined
          - result.data.inactive_seconds is defined
          - result.data.ping_method is defined
          - result.data.keepalive_interval is defined
          - result.data.keepalive_timeout is defined
          - result.data.ping_seconds is defined
          - result.data.ping_action is defined
          - result.data.ping_action_seconds is defined
          - result.data.custom_options is defined
          - result.data.udp_fast_io is defined
          - result.data.exit_notify is defined
          - result.data.sndrcvbuf is defined
          - result.data.create_gw is defined
          - result.data.verbosity_level is defined
          - result.data.id is defined

