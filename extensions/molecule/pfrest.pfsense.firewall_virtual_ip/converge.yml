---
- name: Test pfrest.pfsense.firewall_virtual_ip module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage Virtual IP
      register: result
      pfrest.pfsense.firewall_virtual_ip:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        state: present
        lookup_fields:
          - subnet
        mode: ipalias
        interface: string
        type: single
        subnet: string
        subnet_bits: 9223372036854776000
        descr: string
        noexpand: true
        vhid: 9223372036854776000
        advbase: 9223372036854776000
        advskew: 9223372036854776000
        password: string
        carp_mode: mcast
        carp_peer: string

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.uniqid is defined
          - result.data.mode is defined
          - result.data.interface is defined
          - result.data.type is defined
          - result.data.subnet is defined
          - result.data.subnet_bits is defined
          - result.data.descr is defined
          - result.data.noexpand is defined
          - result.data.vhid is defined
          - result.data.advbase is defined
          - result.data.advskew is defined
          - result.data.password is defined
          - result.data.carp_status is defined
          - result.data.carp_mode is defined
          - result.data.carp_peer is defined
          - result.data.id is defined

