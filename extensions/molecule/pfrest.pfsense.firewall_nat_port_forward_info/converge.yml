---
- name: Test pfrest.pfsense.firewall_nat_port_forward_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read Port Forward
      register: result
      pfrest.pfsense.firewall_nat_port_forward_info:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        lookup_params: {}

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.interface is defined
          - result.data.interface == "string"
          - result.data.ipprotocol is defined
          - result.data.ipprotocol == "inet"
          - result.data.protocol is defined
          - result.data.protocol == "any"
          - result.data.source is defined
          - result.data.source == "string"
          - result.data.source_port is defined
          - result.data.source_port == "string"
          - result.data.destination is defined
          - result.data.destination == "string"
          - result.data.destination_port is defined
          - result.data.destination_port == "string"
          - result.data.target is defined
          - result.data.target == "string"
          - result.data.local_port is defined
          - result.data.local_port == "string"
          - result.data.disabled is defined
          - result.data.disabled == true
          - result.data.nordr is defined
          - result.data.nordr == true
          - result.data.nosync is defined
          - result.data.nosync == true
          - result.data.descr is defined
          - result.data.descr == "string"
          - result.data.natreflection is defined
          - result.data.natreflection == "enable"
          - result.data.associated_rule_id is defined
          - result.data.associated_rule_id == "string"
          - result.data.created_time is defined
          - result.data.created_time == 9223372036854776000
          - result.data.created_by is defined
          - result.data.created_by == "string"
          - result.data.updated_time is defined
          - result.data.updated_time == 9223372036854776000
          - result.data.updated_by is defined
          - result.data.updated_by == "string"
          - result.data.id is defined
          - result.data.id == 0

