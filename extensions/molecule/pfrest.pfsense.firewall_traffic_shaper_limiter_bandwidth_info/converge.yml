---
- name: Test pfrest.pfsense.firewall_traffic_shaper_limiter_bandwidth_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read Traffic Shaper Limiter Bandwidth
      register: result
      pfrest.pfsense.firewall_traffic_shaper_limiter_bandwidth_info:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        lookup_params: {}

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.bw is defined
          - result.data.bw == 9223372036854776000
          - result.data.bwscale is defined
          - result.data.bwscale == "b"
          - result.data.bwsched is defined
          - result.data.bwsched == "string"
          - result.data.parent_id is defined
          - result.data.id is defined
          - result.data.id == 0

