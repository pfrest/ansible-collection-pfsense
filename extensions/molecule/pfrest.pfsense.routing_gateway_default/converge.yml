---
- name: Test pfrest.pfsense.routing_gateway_default module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage Default Gateway
      register: result
      pfrest.pfsense.routing_gateway_default:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        defaultgw4: string
        defaultgw6: string

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.defaultgw4 is defined
          - result.data.defaultgw6 is defined

