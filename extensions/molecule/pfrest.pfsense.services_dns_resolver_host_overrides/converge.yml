---
- name: Test pfrest.pfsense.services_dns_resolver_host_overrides module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage all DNS Resolver Host Overrides
      register: result
      pfrest.pfsense.services_dns_resolver_host_overrides:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        objects:
          - host: string
            domain: string
            ip:
              - string
            descr: string
            aliases:
              - host: string
                domain: string
                descr: string

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence

