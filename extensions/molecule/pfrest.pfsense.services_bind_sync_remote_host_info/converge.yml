---
- name: Test pfrest.pfsense.services_bind_sync_remote_host_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read BIND Sync Remote Host
      register: result
      pfrest.pfsense.services_bind_sync_remote_host_info:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        lookup_params: {}

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.syncdestinenable is defined
          - result.data.syncdestinenable == true
          - result.data.syncprotocol is defined
          - result.data.syncprotocol == "http"
          - result.data.ipaddress is defined
          - result.data.ipaddress == "string"
          - result.data.syncport is defined
          - result.data.syncport == "string"
          - result.data.username is defined
          - result.data.username == "string"
          - result.data.password is defined
          - result.data.password == "string"
          - result.data.id is defined
          - result.data.id == 0

