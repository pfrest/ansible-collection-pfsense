---
- name: Test pfrest.pfsense.interface_lagg module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage Interface LAGG
      register: result
      pfrest.pfsense.interface_lagg:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        state: present
        lookup_fields:
          - id
        descr: string
        members:
          - string
        proto: lacp
        lacptimeout: slow
        lagghash: l2
        failovermaster: string

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.laggif is defined
          - result.data.descr is defined
          - result.data.members is defined
          - result.data.proto is defined
          - result.data.lacptimeout is defined
          - result.data.lagghash is defined
          - result.data.failovermaster is defined
          - result.data.id is defined

