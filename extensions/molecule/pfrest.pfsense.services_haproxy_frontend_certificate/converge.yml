---
- name: Test pfrest.pfsense.services_haproxy_frontend_certificate module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage HAProxy Frontend Certificates
      register: result
      pfrest.pfsense.services_haproxy_frontend_certificate:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        state: present
        lookup_fields:
          - id
        ssl_certificate: string
        parent_lookup_fields:
          - name
        name: string

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.ssl_certificate is defined
          - result.data.id is defined

