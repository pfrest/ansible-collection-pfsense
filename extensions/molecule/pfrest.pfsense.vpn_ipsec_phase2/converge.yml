---
- name: Test pfrest.pfsense.vpn_ipsec_phase2 module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage IPsec Phase 2
      register: result
      pfrest.pfsense.vpn_ipsec_phase2:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        state: present
        lookup_fields:
          - id
        ikeid: 9223372036854776000
        descr: string
        disabled: true
        mode: tunnel
        localid_type: string
        localid_address: string
        localid_netbits: 9223372036854776000
        natlocalid_type: string
        natlocalid_address: string
        natlocalid_netbits: 9223372036854776000
        remoteid_type: string
        remoteid_address: string
        remoteid_netbits: 9223372036854776000
        protocol: esp
        encryption_algorithm_option:
          - name: aes
            keylen: 9223372036854776000
        hash_algorithm_option:
          - hmac_sha1
        pfsgroup: 0
        rekey_time: 9223372036854776000
        rand_time: 9223372036854776000
        lifetime: 9223372036854776000
        pinghost: string
        keepalive: true

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.uniqid is defined
          - result.data.reqid is defined
          - result.data.ikeid is defined
          - result.data.descr is defined
          - result.data.disabled is defined
          - result.data.mode is defined
          - result.data.localid_type is defined
          - result.data.localid_address is defined
          - result.data.localid_netbits is defined
          - result.data.natlocalid_type is defined
          - result.data.natlocalid_address is defined
          - result.data.natlocalid_netbits is defined
          - result.data.remoteid_type is defined
          - result.data.remoteid_address is defined
          - result.data.remoteid_netbits is defined
          - result.data.protocol is defined
          - result.data.encryption_algorithm_option is defined
          - result.data.hash_algorithm_option is defined
          - result.data.pfsgroup is defined
          - result.data.rekey_time is defined
          - result.data.rand_time is defined
          - result.data.lifetime is defined
          - result.data.pinghost is defined
          - result.data.keepalive is defined
          - result.data.id is defined

