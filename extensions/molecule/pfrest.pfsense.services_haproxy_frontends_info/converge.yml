---
- name: Test pfrest.pfsense.services_haproxy_frontends_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Retrieve HA Proxy Frontends
      register: result
      pfrest.pfsense.services_haproxy_frontends_info:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence
          - 'result.data | length > 0'
          - result.data[0].name is defined
          - result.data[0].descr is defined
          - result.data[0].status is defined
          - result.data[0].a_extaddr is defined
          - result.data[0].max_connections is defined
          - result.data[0].type is defined
          - result.data[0].ha_acls is defined
          - result.data[0].a_actionitems is defined
          - result.data[0].backend_serverpool is defined
          - result.data[0].socket_stats is defined
          - result.data[0].dontlognull is defined
          - result.data[0].dontlog_normal is defined
          - result.data[0].log_separate_errors is defined
          - result.data[0].log_detailed is defined
          - result.data[0].a_errorfiles is defined
          - result.data[0].client_timeout is defined
          - result.data[0].forwardfor is defined
          - result.data[0].httpclose is defined
          - result.data[0].advanced_bind is defined
          - result.data[0].advanced is defined
          - result.data[0].ssloffloadcert is defined
          - result.data[0].ha_certificates is defined
          - result.data[0].id is defined

