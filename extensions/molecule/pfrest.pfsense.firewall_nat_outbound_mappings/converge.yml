---
- name: Test pfrest.pfsense.firewall_nat_outbound_mappings module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage all Outbound NAT Mappings
      register: result
      pfrest.pfsense.firewall_nat_outbound_mappings:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        objects:
          - interface: string
            protocol: tcp
            disabled: true
            nonat: true
            nosync: true
            source: string
            source_port: string
            destination: string
            destination_port: string
            target: string
            target_subnet: 9223372036854776000
            nat_port: string
            static_nat_port: true
            poolopts: round-robin
            source_hash_key: string
            descr: string

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence

