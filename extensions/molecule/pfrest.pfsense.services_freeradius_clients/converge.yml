---
- name: Test pfrest.pfsense.services_freeradius_clients module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage all Free RADIUS Clients
      register: result
      pfrest.pfsense.services_freeradius_clients:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        objects:
          - addr: string
            ip_version: ipaddr
            description: string
            shortname: string
            secret: string
            proto: udp
            nastype: cisco
            msgauth: true
            maxconn: 9223372036854776000
            naslogin: string
            naspassword: string

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence

