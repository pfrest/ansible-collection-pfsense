---
- name: Test pfrest.pfsense.services_cron_jobs module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Manage all Cron Jobs
      register: result
      pfrest.pfsense.services_cron_jobs:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false
        objects:
          - minute: string
            hour: string
            mday: string
            month: string
            wday: string
            who: string
            command: string

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence

