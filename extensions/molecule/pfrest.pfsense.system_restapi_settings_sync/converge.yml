---
- name: Test pfrest.pfsense.system_restapi_settings_sync module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Perform REST API Settings Sync action
      register: result
      pfrest.pfsense.system_restapi_settings_sync:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        sync_data: string

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined

