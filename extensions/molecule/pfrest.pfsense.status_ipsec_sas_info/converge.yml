---
- name: Test pfrest.pfsense.status_ipsec_sas_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Retrieve IPsec SA Statuses
      register: result
      pfrest.pfsense.status_ipsec_sas_info:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence
          - 'result.data | length > 0'
          - result.data[0].con_id is defined
          - result.data[0].uniqueid is defined
          - result.data[0].version is defined
          - result.data[0].state is defined
          - result.data[0].local_host is defined
          - result.data[0].local_port is defined
          - result.data[0].local_id is defined
          - result.data[0].remote_host is defined
          - result.data[0].remote_port is defined
          - result.data[0].remote_id is defined
          - result.data[0].initiator_spi is defined
          - result.data[0].responder_spi is defined
          - result.data[0].nat_remote is defined
          - result.data[0].nat_any is defined
          - result.data[0].encr_alg is defined
          - result.data[0].encr_keysize is defined
          - result.data[0].integ_alg is defined
          - result.data[0].prf_alg is defined
          - result.data[0].dh_group is defined
          - result.data[0].established is defined
          - result.data[0].rekey_time is defined
          - result.data[0].child_sas is defined
          - result.data[0].id is defined

