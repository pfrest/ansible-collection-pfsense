---
- name: Test pfrest.pfsense.firewall_nat_outbound_mode_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read Outbound NAT Mode
      register: result
      pfrest.pfsense.firewall_nat_outbound_mode_info:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false
        lookup_params: {}

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is mapping
          - result.data.mode is defined
          - result.data.mode == "automatic"

