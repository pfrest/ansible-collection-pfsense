---
- name: Test pfrest.pfsense.vpn_openvpn_clients_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Retrieve Open VPN Clients
      register: result
      pfrest.pfsense.vpn_openvpn_clients_info:
        api_host: localhost
        api_port: 5000
        api_protocol: http
        validate_certs: false

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence
          - 'result.data | length > 0'
          - result.data[0].vpnid is defined
          - result.data[0].vpnif is defined
          - result.data[0].description is defined
          - result.data[0].disable is defined
          - result.data[0].mode is defined
          - result.data[0].dev_mode is defined
          - result.data[0].protocol is defined
          - result.data[0].interface is defined
          - result.data[0].server_addr is defined
          - result.data[0].server_port is defined
          - result.data[0].local_port is defined
          - result.data[0].proxy_addr is defined
          - result.data[0].proxy_port is defined
          - result.data[0].proxy_authtype is defined
          - result.data[0].proxy_user is defined
          - result.data[0].proxy_passwd is defined
          - result.data[0].auth_user is defined
          - result.data[0].auth_pass is defined
          - result.data[0].auth_retry_none is defined
          - result.data[0].tls is defined
          - result.data[0].tls_type is defined
          - result.data[0].tlsauth_keydir is defined
          - result.data[0].caref is defined
          - result.data[0].certref is defined
          - result.data[0].data_ciphers is defined
          - result.data[0].data_ciphers_fallback is defined
          - result.data[0].digest is defined
          - result.data[0].remote_cert_tls is defined
          - result.data[0].tunnel_network is defined
          - result.data[0].tunnel_networkv6 is defined
          - result.data[0].remote_network is defined
          - result.data[0].remote_networkv6 is defined
          - result.data[0].use_shaper is defined
          - result.data[0].allow_compression is defined
          - result.data[0].passtos is defined
          - result.data[0].route_no_pull is defined
          - result.data[0].route_no_exec is defined
          - result.data[0].dns_add is defined
          - result.data[0].topology is defined
          - result.data[0].inactive_seconds is defined
          - result.data[0].ping_method is defined
          - result.data[0].keepalive_interval is defined
          - result.data[0].keepalive_timeout is defined
          - result.data[0].ping_seconds is defined
          - result.data[0].ping_action is defined
          - result.data[0].ping_action_seconds is defined
          - result.data[0].custom_options is defined
          - result.data[0].udp_fast_io is defined
          - result.data[0].exit_notify is defined
          - result.data[0].sndrcvbuf is defined
          - result.data[0].create_gw is defined
          - result.data[0].verbosity_level is defined
          - result.data[0].id is defined

