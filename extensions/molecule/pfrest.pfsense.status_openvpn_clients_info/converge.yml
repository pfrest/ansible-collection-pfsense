---
- name: Test pfrest.pfsense.status_openvpn_clients_info module
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Retrieve OpenVPN Client Statuses
      register: result
      pfrest.pfsense.status_openvpn_clients_info:
        api_host: localhost
        api_port: 15070
        api_protocol: http
        validate_certs: false

    - name: Assert results
      ansible.builtin.assert:
        that:
          - result is defined
          - result is mapping
          - result.code is defined
          - result.code == 200
          - result.response_id is defined
          - result.response_id == "MOCK_SUCCESS"
          - result.msg is defined
          - result.data is defined
          - result.data is sequence
          - 'result.data | length > 0'
          - result.data[0].name is defined
          - result.data[0].port is defined
          - result.data[0].vpnid is defined
          - result.data[0].mgmt is defined
          - result.data[0].status is defined
          - result.data[0].state is defined
          - result.data[0].state_detail is defined
          - result.data[0].connect_time is defined
          - result.data[0].virtual_addr is defined
          - result.data[0].virtual_addr6 is defined
          - result.data[0].remote_host is defined
          - result.data[0].remote_port is defined
          - result.data[0].local_host is defined
          - result.data[0].local_port is defined
          - result.data[0].id is defined

