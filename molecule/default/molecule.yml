---
driver:
  name: docker
platforms:
  - name: pfrest-mock-basic-auth
    image: ghcr.io/pfrest/mock-api
    pre_build_image: true
    override_command: false
    published_ports:
      - "0.0.0.0:5000:5000"
    volumes:
      - "${MOLECULE_SCENARIO_DIRECTORY}/mocks:/mocks:ro"
    env:
      # Mock API authentication credentials (Base64 encoded "test_username:test_password")
      MOCK_API_AUTH_HEADERS: '{"Authorization": "Basic dGVzdF91c2VybmFtZTp0ZXN0X3Bhc3N3b3Jk"}'

  - name: pfrest-mock-api-key
    image: ghcr.io/pfrest/mock-api
    pre_build_image: true
    override_command: false
    published_ports:
      - "0.0.0.0:5001:5000"
    volumes:
      - "${MOLECULE_SCENARIO_DIRECTORY}/mocks:/mocks:ro"
    env:
      MOCK_API_AUTH_HEADERS: '{"x-api-key": "sometestapikey"}'
provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
